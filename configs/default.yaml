# Uncomment to avoid typing --source and --out-dir on every run:
# source: data/videos/race.mp4
# out_dir: data/artifacts/race_name

runtime:
  device: auto
  source_fps_fallback: 30.0

line:
  value: "50%,5%,50%,95%"
  width: 24
  cooldown_sec: 2.0
  direction: left_to_right
  read_distance_multiplier: 2.5

models:
  vehicle_model: data/models/yolov8n.pt
  plate_model: data/models/yolov8n_plates_ft1.pt
  tracker: botsort.yaml
  motorcycle_class_id: 3
  vehicle_conf: 0.35
  vehicle_iou: 0.5
  vehicle_imgsz: 640
  plate_conf: 0.15
  plate_has_class: true
  plate_class_id: 0
  bike_crop_expand: 0.10
  plate_box_expand: 0.12
  min_bike_crop_px: 96
  plate_zone_n: 9
  plate_zone_select: [4, 5, 7, 8]

reads:
  scan_every_n_frames: 1
  min_digits: 1
  vote_window_sec: 2.5
  track_state_ttl_sec: 10.0

reid:
  enabled: false
  gallery_path: data/artifacts/StartTO_17Jan_crops/plate_crops/resolved
  threshold: 0.6

stream:
  reconnect_delay_sec: 3.0
  max_reconnects: -1
  loop_file: false
  status_interval_sec: 10.0

output:
  write_video: true
  write_csv: true
  write_jsonl: true
  write_summary: true
  overlay_top_n: 10
  save_plate_crops: true

service:
  host: 127.0.0.1
  port: 8080
